<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Detalle del taco</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="container">

        <h1>Detalle del taco</h1>

        <section th:if="${tacoDetalle != null}">
            <ul>
                <li>
                    <strong>ID:</strong>
                    <span th:text="${tacoDetalle.id}"></span>
                </li>

                <li>
                    <strong>Nombre:</strong>
                    <span th:text="${tacoDetalle.nombre}"></span>
                </li>

                <li>
                    <strong>Carne:</strong>
                    <span th:text="${tacoDetalle.tipoCarne}"></span>
                </li>

                <li>
                    <strong>Tortilla:</strong>
                    <span th:text="${tacoDetalle.tipoTortilla}"></span>
                </li>

                <li>
                    <strong>Salsa:</strong>
                    <span th:text="${tacoDetalle.tipoSalsa != null
                            ? tacoDetalle.tipoSalsa
                            : 'Sin salsa'}">
                    </span>
                </li>

                <li>
                    <strong>Precio:</strong>
                    $<span th:text="${tacoDetalle.precio}"></span>
                </li>

                <li>
                    <strong>Cantidad:</strong>
                    <span th:text="${tacoDetalle.cantidad}"></span>
                </li>
            </ul>
        </section>

        <p th:if="${tacoDetalle == null}" class="success-banner" style="border-left-color: var(--primary-color);">
            <strong style="color: var(--primary-color);">Búsqueda fallida:</strong>
            No se encontró un taco con el ID <span th:text="${idBuscado}"></span>.
        </p>

        <p>
            <a th:href="@{/practica2_info}" class="btn-back">
                Volver a la lista
            </a>
        </p>

    </div>
</body>
</html>
